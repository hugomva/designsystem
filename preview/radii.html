<!doctype html><html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px; background: var(--mva-paper); font-family: var(--font-body); }
  .row { display:flex; gap: 14px; align-items:flex-end; }
  .box { width: 80px; height: 80px; background: var(--mva-mint); display:flex; align-items:center; justify-content:center; color: var(--mva-navy); font-family: var(--font-mono); font-size: 11px; }
</style></head>
<body>
<div class="row">
  <div><div class="box" style="border-radius: 6px">6</div><div style="font-size:10px;text-align:center;color:var(--fg-3);margin-top:4px">--r-xs</div></div>
  <div><div class="box" style="border-radius: 10px">10</div><div style="font-size:10px;text-align:center;color:var(--fg-3);margin-top:4px">--r-sm</div></div>
  <div><div class="box" style="border-radius: 16px">16</div><div style="font-size:10px;text-align:center;color:var(--fg-3);margin-top:4px">--r-md</div></div>
  <div><div class="box" style="border-radius: 24px">24</div><div style="font-size:10px;text-align:center;color:var(--fg-3);margin-top:4px">--r-lg</div></div>
  <div><div class="box" style="border-radius: 32px">32</div><div style="font-size:10px;text-align:center;color:var(--fg-3);margin-top:4px">--r-xl</div></div>
  <div><div class="box" style="border-radius: 999px">pill</div><div style="font-size:10px;text-align:center;color:var(--fg-3);margin-top:4px">--r-pill</div></div>
</div>
</body></html>
