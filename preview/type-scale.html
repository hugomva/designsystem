<!doctype html><html><head><meta charset="utf-8"><title>Type Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 16px; background: var(--mva-paper); font-family: var(--font-body); }
  table { width: 100%; border-collapse: collapse; }
  td { padding: 4px 8px; vertical-align: baseline; border-bottom: 1px solid var(--line); }
  .tok { font-family: var(--font-mono); color: var(--fg-3); font-size: 11px; width: 70px; }
  .px  { color: var(--fg-3); font-size: 11px; width: 50px; text-align: right; }
  .sample { color: var(--mva-navy); font-family: var(--font-display); font-weight: 700; line-height: 1.05; letter-spacing: -.01em; }
  .sample.body { font-family: var(--font-body); font-weight: 400; letter-spacing: 0; }
</style></head>
<body>
<table>
  <tr><td class="tok">--fs-d3</td><td class="px">48px</td><td class="sample" style="font-size:48px">Modern life</td></tr>
  <tr><td class="tok">--fs-h1</td><td class="px">40px</td><td class="sample" style="font-size:40px">Header</td></tr>
  <tr><td class="tok">--fs-h2</td><td class="px">28px</td><td class="sample" style="font-size:28px">Subhead</td></tr>
  <tr><td class="tok">--fs-h3</td><td class="px">22px</td><td class="sample" style="font-size:22px">Section</td></tr>
  <tr><td class="tok">--fs-body</td><td class="px">17px</td><td class="sample body" style="font-size:17px">The body copy size, paragraphs sit here.</td></tr>
  <tr><td class="tok">--fs-cap</td><td class="px">13px</td><td class="sample body" style="font-size:13px;color:var(--fg-3)">Caption / metadata</td></tr>
</table>
</body></html>
