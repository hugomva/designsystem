<!doctype html><html><head><meta charset="utf-8"><title>Semantic Colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--mva-paper); padding: 16px; font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .row { display:flex; align-items:center; gap:10px; padding:10px; background:#fff; border:1px solid var(--line); border-radius:10px; }
  .chip { width: 36px; height: 36px; border-radius: 8px; border: 1px solid rgba(13,47,105,.08); flex-shrink: 0; }
  .meta .k { font-size:13px; font-weight: 700; color: var(--fg); }
  .meta .v { font-size:11px; color: var(--fg-3); font-family: var(--font-mono); }
</style></head>
<body>
<div class="grid">
  <div class="row"><div class="chip" style="background:var(--bg)"></div><div class="meta"><div class="k">--bg</div><div class="v">page background</div></div></div>
  <div class="row"><div class="chip" style="background:var(--bg-elev)"></div><div class="meta"><div class="k">--bg-elev</div><div class="v">elevated surfaces</div></div></div>
  <div class="row"><div class="chip" style="background:var(--bg-brand)"></div><div class="meta"><div class="k">--bg-brand</div><div class="v">primary coloured bg</div></div></div>
  <div class="row"><div class="chip" style="background:var(--bg-brand-2)"></div><div class="meta"><div class="k">--bg-brand-2</div><div class="v">deep brand bg</div></div></div>
  <div class="row"><div class="chip" style="background:var(--fg)"></div><div class="meta"><div class="k">--fg</div><div class="v">primary ink</div></div></div>
  <div class="row"><div class="chip" style="background:var(--fg-2)"></div><div class="meta"><div class="k">--fg-2</div><div class="v">secondary ink</div></div></div>
  <div class="row"><div class="chip" style="background:var(--fg-3)"></div><div class="meta"><div class="k">--fg-3</div><div class="v">tertiary / caption</div></div></div>
  <div class="row"><div class="chip" style="background:var(--accent)"></div><div class="meta"><div class="k">--accent</div><div class="v">mint highlight</div></div></div>
</div>
</body></html>
