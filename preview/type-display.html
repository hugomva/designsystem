<!doctype html><html><head><meta charset="utf-8"><title>Display Type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px; background: var(--mva-paper); }
  .stack { display: grid; gap: 6px; }
  .row { display:flex; align-items:baseline; gap:14px; }
  .meta { font-family: var(--font-body); color: var(--fg-3); font-size: 11px; min-width: 130px; }
  .specimen { font-family: var(--font-display); font-weight: 700; color: var(--mva-navy); letter-spacing: -0.01em; line-height: 1.05; }
</style></head>
<body>
<div class="stack">
  <div class="row"><div class="meta">Viney Bold · 64px</div><div class="specimen" style="font-size:64px">Education, evolved</div></div>
  <div class="row"><div class="meta">Viney Bold · 40px</div><div class="specimen" style="font-size:40px">Meet Suzanne</div></div>
  <div class="row"><div class="meta">Viney Bold · 28px</div><div class="specimen" style="font-size:28px">A new vision for education</div></div>
</div>
</body></html>
