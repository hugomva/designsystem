<!doctype html><html><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 22px; background: var(--mva-paper); font-family: var(--font-body); }
  .row { display:flex; gap: 22px; }
  .box { width: 130px; height: 90px; background: #fff; border-radius: 12px; display:flex; align-items:center; justify-content:center; color: var(--fg-3); font-family: var(--font-mono); font-size: 11px; }
</style></head>
<body>
<div class="row">
  <div class="box" style="box-shadow: var(--shadow-sm)">--shadow-sm</div>
  <div class="box" style="box-shadow: var(--shadow-md)">--shadow-md</div>
  <div class="box" style="box-shadow: var(--shadow-lg)">--shadow-lg</div>
</div>
</body></html>
