<!doctype html><html><head><meta charset="utf-8"><title>Portrait Circles</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px; margin: 0; background: var(--mva-og); font-family: var(--font-body); color: #fff; }
  .row { display:flex; gap: 14px; align-items:center; }
  .circle {
    width: 110px; height: 110px; border-radius: 50%;
    background: linear-gradient(135deg, #b9d8e0 0%, #7caab8 100%);
    flex-shrink: 0;
    box-shadow: var(--shadow-md);
    position: relative; overflow: hidden;
  }
  .circle.alt { background: linear-gradient(135deg, var(--mva-yellow), var(--mva-orange)); }
  .circle.alt2 { background: linear-gradient(135deg, var(--mva-pink), var(--mva-mint)); }
  .meta { font-size: 13px; color: rgba(255,255,255,.92); }
  .meta b { font-family: var(--font-display); font-size: 18px; display:block; color: #fff; }
</style></head>
<body>
<div class="row">
  <div class="circle"></div>
  <div class="circle alt"></div>
  <div class="circle alt2"></div>
  <div class="meta"><b>Circle device</b>Cut-out portraits live in circles, typically right-anchored, often bleeding off the edge.</div>
</div>
</body></html>
