<!doctype html><html><head><meta charset="utf-8"><title>Promo Bar</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 0; margin: 0; background: var(--mva-paper); font-family: var(--font-body); }
  .promo { background: var(--mva-orange); color: #fff; height: 44px; display:flex; align-items:center; justify-content:center; gap:10px; font-size: 14px; font-weight: 500; }
  .promo .arrow { display: inline-block; transform: translateY(-1px); }
  .below { padding: 14px 20px; }
  .below .h { font-family: var(--font-display); font-weight:700; color: var(--mva-navy); font-size: 22px; }
</style></head>
<body>
<div class="promo">Join us on 1st June. Last few places available! <span class="arrow">→</span></div>
<div class="below">
  <div class="h">Top promo bar, full-bleed orange · white text · right arrow</div>
</div>
</body></html>
