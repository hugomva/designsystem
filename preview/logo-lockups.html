<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Logo lockups</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .cell { padding: 28px; border-radius: 14px; display: flex; align-items: center; justify-content: center; min-height: 110px; position: relative; }
  .cell img { max-width: 80%; max-height: 70px; }
  .cell .lab { position: absolute; bottom: 8px; left: 12px; font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; opacity: .55; }
  .light { background: var(--mva-paper); }
  .light .lab { color: var(--mva-navy); }
  .dark  { background: var(--mva-navy); }
  .dark  .lab { color: rgba(255,255,255,.85); }
</style>
</head>
<body>
<div class="grid">
  <div class="cell light"><img src="../assets/logos/mva-lockup-navy-mint.png" alt=""><span class="lab">Brand · Navy + Mint</span></div>
  <div class="cell light"><img src="../assets/logos/mva-lockup-navy.png" alt=""><span class="lab">Brand · All Navy</span></div>
  <div class="cell dark"><img src="../assets/logos/mva-lockup-white-mint.png" alt=""><span class="lab">Brand · White + Mint</span></div>
  <div class="cell dark"><img src="../assets/logos/mva-lockup-white.png" alt=""><span class="lab">Brand · All White</span></div>
  <div class="cell light"><img src="../assets/logos/mva-mark-navy.png" alt="" style="max-height:54px;"><span class="lab">Mark · Navy</span></div>
  <div class="cell dark"><img src="../assets/logos/mva-mark-white.png" alt="" style="max-height:54px;"><span class="lab">Mark · White</span></div>
</div>
</body>
</html>
