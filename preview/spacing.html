<!doctype html><html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 16px; background: var(--mva-paper); font-family: var(--font-body); }
  .row { display:flex; align-items:center; gap: 10px; margin-bottom: 6px; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); width: 70px; }
  .px  { font-size: 11px; color: var(--fg-3); width: 40px; text-align: right; }
  .bar { height: 12px; background: var(--mva-mint); border-radius: 4px; }
</style></head>
<body>
  <div class="row"><span class="tok">--sp-1</span><span class="px">4</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="tok">--sp-2</span><span class="px">8</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="tok">--sp-3</span><span class="px">12</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="tok">--sp-4</span><span class="px">16</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="tok">--sp-5</span><span class="px">24</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="tok">--sp-6</span><span class="px">32</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="tok">--sp-7</span><span class="px">48</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="tok">--sp-8</span><span class="px">64</span><div class="bar" style="width:64px"></div></div>
</body></html>
