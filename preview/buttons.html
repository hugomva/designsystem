<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px; background: var(--mva-paper); font-family: var(--font-body); }
  .row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom: 10px; }
  .btn {
    display:inline-flex; align-items:center; gap:8px;
    height: 44px; padding: 0 20px; border-radius: 999px;
    font-family: var(--font-body); font-weight: 700; font-size: 15px;
    border: 1.5px solid transparent; cursor: pointer; transition: all var(--dur-base) var(--ease-out);
  }
  .btn-primary { background: var(--mva-mint); color: var(--mva-navy); }
  .btn-primary:hover { background: #6ee0a9; }
  .btn-outline { background: transparent; color: var(--mva-navy); border-color: var(--mva-navy); }
  .btn-outline-white { background: transparent; color: #fff; border-color: #fff; }
  .btn-orange { background: var(--mva-orange); color: #fff; }
  .btn .arrow { width: 22px; height: 22px; border-radius: 50%; background: rgba(13,47,105,.15); display:inline-flex; align-items:center; justify-content:center; font-size: 12px; }
  .dark { background: var(--mva-og); padding: 14px; border-radius: 14px; display:flex; gap:10px; }
</style></head>
<body>
<div class="row">
  <button class="btn btn-primary">Discover MVA <span class="arrow">↓</span></button>
  <button class="btn btn-outline">Book a Discovery Call</button>
  <button class="btn btn-orange">Get Started</button>
</div>
<div class="dark">
  <button class="btn btn-primary">Get in touch</button>
  <button class="btn btn-outline-white">Get Started</button>
</div>
</body></html>
