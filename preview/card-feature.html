<!doctype html><html><head><meta charset="utf-8"><title>Cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px; background: var(--mva-og); font-family: var(--font-body); }
  .card {
    background: #fff; border-radius: 16px; padding: 16px;
    box-shadow: var(--shadow-md);
    display: grid; grid-template-columns: 56px 1fr; gap: 14px;
    max-width: 460px;
  }
  .avatar { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, var(--mva-pink), var(--mva-yellow)); }
  .meta .label { color: var(--mva-navy); font-weight: 700; font-size: 12px; letter-spacing: .04em; text-transform: uppercase; opacity: .7;}
  .meta .title { font-family: var(--font-display); font-weight: 700; color: var(--mva-navy); font-size: 18px; margin-top: 2px; }
  .meta .body  { color: var(--fg-2); font-size: 13px; line-height: 1.45; margin-top: 6px; }
</style></head>
<body>
<div class="card">
  <div class="avatar"></div>
  <div class="meta">
    <div class="label">Introducing</div>
    <div class="title">MVA Start</div>
    <div class="body">Your child can begin sooner with MVA, a weekly programme designed to rebuild confidence and prepare them for their full timetable starting 1st June.</div>
  </div>
</div>
</body></html>
